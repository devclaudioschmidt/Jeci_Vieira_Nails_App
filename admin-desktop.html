<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jeci Vieira - Painel Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/style.css">
    <style>
        body { 
            background: var(--bg-gradient); 
            font-family: 'Poppins', sans-serif;
        }
        .admin-container { padding: 24px 32px; max-width: 1400px; margin: 0 auto; }
        
        .header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 24px; 
        }
        .header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            font-weight: 600;
            color: var(--secondary);
        }
        
        .stats-grid { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            gap: 16px; 
            margin-bottom: 24px; 
        }
        .stat-card { 
            background: var(--bg-card); 
            padding: 20px; 
            border-radius: var(--radius-md); 
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--primary-light);
            text-align: center;
            transition: var(--transition);
        }
        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }
        .stat-card .label { 
            font-size: 0.75rem; 
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .stat-card .value { 
            font-size: 1.8rem; 
            font-weight: 700; 
            color: var(--secondary);
            font-family: 'Playfair Display', serif;
            margin: 8px 0;
        }
        .stat-card .sub { font-size: 0.8rem; color: var(--success); }
        
        .content-area { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 24px; 
        }
        
        .card { 
            background: var(--bg-card); 
            border-radius: var(--radius-md); 
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--primary-light);
            overflow: hidden; 
        }
        .card-header { 
            padding: 16px 20px; 
            border-bottom: 1px solid var(--primary-light); 
            font-weight: 600;
            font-size: 1rem;
            color: var(--secondary);
        }
        
        .appointments-list { max-height: 420px; overflow-y: auto; }
        .appointment-item { 
            display: flex; 
            align-items: center; 
            padding: 14px 18px; 
            border-bottom: 1px solid var(--primary-light); 
            gap: 16px;
            transition: var(--transition);
        }
        .appointment-item:hover { 
            background: var(--primary-light); 
        }
        .appointment-time { 
            font-weight: 700; 
            color: var(--primary-dark); 
            min-width: 55px;
            font-size: 0.9rem;
        }
        .appointment-info { flex: 1; }
        .appointment-info h4 { 
            font-size: 0.95rem; 
            margin-bottom: 2px;
            font-weight: 600;
        }
        .appointment-info p { 
            font-size: 0.8rem; 
            color: var(--text-muted); 
        }
        .appointment-status { 
            font-size: 0.7rem; 
            padding: 4px 12px; 
            border-radius: var(--radius-full); 
            background: var(--accent-light);
            font-weight: 600;
        }
        
        .btn { 
            padding: 12px 20px; 
            border: none; 
            border-radius: var(--radius-full); 
            cursor: pointer; 
            font-weight: 600; 
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: var(--transition);
            font-family: 'Poppins', sans-serif;
        }
        .btn-primary { 
            background: linear-gradient(135deg, var(--primary-dark), var(--accent)); 
            color: white;
            box-shadow: var(--shadow-sm);
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }
        .btn-secondary { 
            background: var(--bg-card); 
            border: 1px solid var(--primary-light);
            color: var(--text-primary);
        }
        .btn-secondary:hover {
            background: var(--primary-light);
        }
        .btn-small { padding: 8px 14px; font-size: 0.8rem; }
        
        .loading { 
            text-align: center; 
            padding: 40px; 
            color: var(--text-muted); 
        }
        
        /* Calendar */
        .calendar { padding: 16px; }
        .calendar-month { 
            font-weight: 700; 
            font-size: 1.1rem;
            font-family: 'Playfair Display', serif;
            color: var(--secondary);
        }
        .calendar-grid { 
            display: grid; 
            grid-template-columns: repeat(7, 1fr); 
            gap: 6px;
            margin-top: 12px;
        }
        .calendar-day-header { 
            text-align: center; 
            font-size: 0.65rem; 
            color: var(--text-muted); 
            padding: 10px; 
            font-weight: 600; 
            text-transform: uppercase; 
        }
        .calendar-day { 
            text-align: center; 
            padding: 8px 0; 
            font-size: 0.85rem; 
            border-radius: var(--radius-sm); 
            cursor: pointer; 
            position: relative; 
            transition: var(--transition); 
            font-weight: 500;
            aspect-ratio: 1;
        }
        .calendar-day:hover:not(.other-month) { 
            background: var(--primary-light); 
        }
        .calendar-day.today { 
            background: var(--accent-light); 
            font-weight: 700; 
        }
        .calendar-day.selected { 
            background: linear-gradient(135deg, var(--primary-dark), var(--accent)); 
            color: white;
            font-weight: 700;
        }
        .calendar-day.has-appointments { 
            background: linear-gradient(135deg, var(--primary-light), #f5e0e3); 
        }
        .calendar-day.has-appointments.selected { 
            background: linear-gradient(135deg, var(--primary-dark), var(--accent)); 
        }
        .calendar-dot { 
            position: absolute; 
            bottom: 3px; 
            left: 50%; 
            transform: translateX(-50%); 
            width: 5px; 
            height: 5px; 
            background: var(--primary-dark); 
            border-radius: 50%; 
        }
        .calendar-day.selected .calendar-dot { background: white; }
        .calendar-day.other-month { color: var(--text-muted); opacity: 0.4; }
        
        .calendar-nav-btns {
            display: flex;
            gap: 8px;
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <div class="header">
            <h1>Dashboard - Jeci Vieira</h1>
            <button class="btn btn-secondary" onclick="loadData()">Atualizar</button>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="label">HOJE</div>
                <div class="value" id="today-count">0</div>
                <div id="today-revenue">R$ 0</div>
            </div>
            <div class="stat-card">
                <div class="label">SEMANA</div>
                <div class="value" id="week-count">0</div>
                <div id="week-revenue">R$ 0</div>
            </div>
            <div class="stat-card">
                <div class="label">MÊS</div>
                <div class="value" id="month-count">0</div>
                <div id="month-revenue">R$ 0</div>
            </div>
            <div class="stat-card">
                <div class="label">CLIENTES</div>
                <div class="value" id="clients-count">0</div>
            </div>
        </div>

        <div class="content-area">
            <div class="card">
                <div class="card-header">
                    <span>Calendário</span>
                </div>
                <div class="calendar">
                    <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px;">
                        <button class="btn btn-secondary btn-small" onclick="changeMonth(-1)">&#8249; Anterior</button>
                        <span class="calendar-month" id="calendar-month">Janeiro 2026</span>
                        <button class="btn btn-secondary btn-small" onclick="changeMonth(1)">Próximo &#8250;</button>
                    </div>
                    <div class="calendar-grid" id="calendar"></div>
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    <span id="selected-date-title">Próximos Agendamentos</span>
                </div>
                <div class="appointments-list" id="appointments-list">
                    <div class="loading" id="loading">Carregando...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbyez_b7XdW64EiNo4XNbo_hqbtqfQnr95kiScElYMqDYgGZnNVvRd-In4Du55_DiXKy/exec';
        
        let allAppointments = [];
        let currentMonth = new Date().getMonth();
        let currentYear = new Date().getFullYear();
        let selectedDate = null;

        const monthNames = ['Janeiro', 'Fevereiro', 'Março', 'Abril', 'Maio', 'Junho', 'Julho', 'Agosto', 'Setembro', 'Outubro', 'Novembro', 'Dezembro'];
        const dayNames = ['Dom', 'Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sáb'];

        document.addEventListener('DOMContentLoaded', () => {
            const today = new Date();
            selectedDate = today.toISOString().split('T')[0];
            loadData();
        });

        function loadData() {
            const loading = document.getElementById('loading');
            if (loading) {
                loading.style.display = 'block';
                loading.textContent = 'Carregando...';
            }
            
            fetch(GAS_URL + '?action=getAgendamentos')
                .then(res => res.json())
                .then(data => {
                    console.log('Dados recebidos:', data);
                    allAppointments = Array.isArray(data) ? data : [];
                    updateStats();
                    renderCalendar();
                    renderAppointments();
                    if (loading) loading.style.display = 'none';
                })
                .catch(err => {
                    console.error('Erro:', err);
                    if (loading) loading.textContent = 'Erro ao carregar';
                });
        }

        function updateStats() {
            const today = new Date();
            const todayStr = today.toISOString().split('T')[0];
            
            const todayApps = allAppointments.filter(a => a.data === todayStr);
            document.getElementById('today-count').textContent = todayApps.length;
            document.getElementById('today-revenue').textContent = todayApps.length + ' agendamentos';

            const weekStart = new Date(today);
            weekStart.setDate(today.getDate() - today.getDay());
            const weekApps = allAppointments.filter(a => new Date(a.data) >= weekStart);
            document.getElementById('week-count').textContent = weekApps.length;
            document.getElementById('week-revenue').textContent = weekApps.length + ' agendamentos';

            const monthApps = allAppointments.filter(a => a.data && a.data.startsWith(todayStr.substring(0, 7)));
            document.getElementById('month-count').textContent = monthApps.length;
            document.getElementById('month-revenue').textContent = monthApps.length + ' agendamentos';

            const uniqueClients = new Set(allAppointments.map(a => a.telefone)).size;
            document.getElementById('clients-count').textContent = uniqueClients;
        }

        function renderCalendar() {
            document.getElementById('calendar-month').textContent = `${monthNames[currentMonth]} ${currentYear}`;
            
            const firstDay = new Date(currentYear, currentMonth, 1).getDay();
            const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
            const daysInPrevMonth = new Date(currentYear, currentMonth, 0).getDate();
            
            const today = new Date();
            const todayStr = today.toISOString().split('T')[0];
            
            const counts = {};
            allAppointments.forEach(app => {
                if (app.data) counts[app.data] = (counts[app.data] || 0) + 1;
            });
            
            let html = dayNames.map(d => `<div class="calendar-day-header">${d}</div>`).join('');
            
            // Previous month
            for (let i = firstDay - 1; i >= 0; i--) {
                html += `<div class="calendar-day other-month">${daysInPrevMonth - i}</div>`;
            }
            
            // Current month
            for (let day = 1; day <= daysInMonth; day++) {
                const dateStr = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const isToday = dateStr === todayStr;
                const isSelected = dateStr === selectedDate;
                const count = counts[dateStr] || 0;
                
                let classes = 'calendar-day';
                if (isToday) classes += ' today';
                if (isSelected) classes += ' selected';
                if (count > 0) classes += ' has-appointments';
                
                const dot = count > 0 ? '<span class="calendar-dot"></span>' : '';
                
                html += `<div class="${classes}" onclick="selectDate('${dateStr}', this)">${day}${dot}</div>`;
            }
            
            // Next month
            const total = firstDay + daysInMonth;
            const remaining = 42 - total;
            for (let i = 1; i <= remaining; i++) {
                html += `<div class="calendar-day other-month">${i}</div>`;
            }
            
            document.getElementById('calendar').innerHTML = html;
        }

        function changeMonth(delta) {
            currentMonth += delta;
            if (currentMonth > 11) { currentMonth = 0; currentYear++; }
            if (currentMonth < 0) { currentMonth = 11; currentYear--; }
            renderCalendar();
        }

        function selectDate(dateStr, element) {
            selectedDate = dateStr;
            renderCalendar();
            renderAppointments();
        }

        function renderAppointments() {
            const listEl = document.getElementById('appointments-list');
            const titleEl = document.getElementById('selected-date-title');
            
            if (selectedDate) {
                const parts = selectedDate.split('-');
                const d = new Date(parts[0], parts[1] - 1, parts[2]);
                titleEl.textContent = d.toLocaleDateString('pt-BR', { day: 'numeric', month: 'long' });
            }
            
            let apps = allAppointments;
            
            if (selectedDate) {
                apps = allAppointments.filter(a => a.data === selectedDate);
            } else {
                const now = new Date();
                apps = allAppointments
                    .filter(a => new Date(a.data + 'T' + a.hora) >= now)
                    .sort((a, b) => {
                        if (a.data !== b.data) return a.data.localeCompare(b.data);
                        return a.hora.localeCompare(b.hora);
                    })
                    .slice(0, 15);
            }
            
            if (apps.length === 0) {
                listEl.innerHTML = '<div class="loading">Nenhum agendamento encontrado</div>';
                return;
            }
            
            listEl.innerHTML = apps
                .sort((a, b) => (a.hora || '').localeCompare(b.hora || ''))
                .map(app => `
                <div class="appointment-item">
                    <div class="appointment-time">${app.hora || '--:--'}</div>
                    <div class="appointment-info">
                        <h4>${app.cliente || 'Cliente'}</h4>
                        <p>${app.servico || 'Serviço'}</p>
                    </div>
                    <div class="appointment-status">${formatDate(app.data)}</div>
                </div>
            `).join('');
        }

        function formatDate(dateStr) {
            if (!dateStr) return '';
            const parts = dateStr.split('-');
            return parts[2] + '/' + parts[1];
        }
    </script>
</body>
</html>
