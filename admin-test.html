<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Teste | Jeci Vieira Nails</title>
    <link rel="stylesheet" href="assets/style.css">
    <style>
        body {
            background: #fdf8f8;
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        }
        .test-container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .test-title {
            font-size: 24px;
            color: #2d2d2d;
            margin-bottom: 20px;
            text-align: center;
        }
        .test-btn {
            background: #d4919a;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin: 5px;
        }
        .test-btn:hover {
            background: #c4818a;
        }
        .test-result {
            margin-top: 20px;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 8px;
            font-family: monospace;
            font-size: 14px;
            white-space: pre-wrap;
            max-height: 300px;
            overflow-y: auto;
        }
        .debug-info {
            margin-top: 30px;
            padding: 15px;
            background: #e8f5e9;
            border-radius: 8px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="test-container">
        <h1 class="test-title">🐱 Admin - Modo Teste</h1>
        
        <div style="text-align: center; margin-bottom: 20px;">
            <button class="test-btn" onclick="testAPI('getServicos')">Testar getServicos</button>
            <button class="test-btn" onclick="testAPI('login')">Testar Login</button>
            <button class="test-btn" onclick="testAPI('getAgendamentos')">Testar Agendamentos</button>
        </div>
        
        <div style="text-align: center; margin-bottom: 20px;">
            <button class="test-btn" style="background: #4CAF50;" onclick="cadastrarServicoTeste()">Cadastrar Serviço Teste</button>
        </div>
        
        <div id="result" class="test-result">Clique em um botão para testar...</div>
        
        <div class="debug-info">
            <strong>Debug Info:</strong><br>
            API_URL: <span id="apiUrl"></span><br>
            Page loaded: <span id="loadStatus"></span><br>
            API reachable: <span id="apiStatus"></span>
        </div>
    </div>

    <script>
        const API_URL = 'https://us-central1-app-jeci-vieira-nails.cloudfunctions.net/api';
        
        document.getElementById('apiUrl').textContent = API_URL;
        document.getElementById('loadStatus').textContent = '✅ Carregado';
        
        async function testAPI(action) {
            const resultDiv = document.getElementById('result');
            resultDiv.textContent = '⏳ Testando...';
            
            try {
                const url = `${API_URL}?action=${action}`;
                const response = await fetch(url);
                const data = await response.json();
                resultDiv.textContent = `✅ Sucesso!\n\nStatus: ${response.status}\n\nResposta:\n${JSON.stringify(data, null, 2)}`;
            } catch (error) {
                resultDiv.textContent = `❌ Erro!\n\n${error.message}`;
            }
        }
        
        async function cadastrarServicoTeste() {
            const resultDiv = document.getElementById('result');
            resultDiv.textContent = '⏳ Cadastrando serviço de teste...';
            
            try {
                const formData = new URLSearchParams();
                formData.append('action', 'salvarServico');
                formData.append('id', 'teste-' + Date.now());
                formData.append('category', 'manicure');
                formData.append('name', 'Serviço de Teste');
                formData.append('description', 'Este é um serviço de teste');
                formData.append('price', '35');
                formData.append('duration', '30');
                
                const response = await fetch(API_URL, {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if (data.sucesso) {
                    resultDiv.textContent = `✅ Serviço cadastrado com sucesso!\n\nID: teste-${Date.now()}\n\nClique em "Testar getServicos" para ver o resultado.`;
                } else {
                    resultDiv.textContent = `❌ Erro: ${data.erro || 'Desconhecido'}`;
                }
            } catch (error) {
                resultDiv.textContent = `❌ Erro!\n\n${error.message}`;
            }
        }
        
        // Test API reachability
        fetch(API_URL + '?action=getServicos')
            .then(() => {
                document.getElementById('apiStatus').textContent = '✅ OK';
                document.getElementById('apiStatus').style.color = 'green';
            })
            .catch(() => {
                document.getElementById('apiStatus').textContent = '❌ Falhou';
                document.getElementById('apiStatus').style.color = 'red';
            });
    </script>
</body>
</html>
