<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Administrativo | Jeci Vieira Nails</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/style.css">
    <style>
        /* Estilos de fallback garantidos */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Poppins', sans-serif; 
            background: #fdf8f8; 
            min-height: 100vh; 
        }
        .admin-container { 
            max-width: 800px; 
            margin: 0 auto; 
            padding: 20px; 
        }
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
            background: white;
            border-radius: 16px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(212, 145, 154, 0.15);
        }
        .logo { display: flex; align-items: center; gap: 12px; }
        .logo-icon { width: 44px; height: 44px; color: #d4919a; }
        .logo-text { display: flex; flex-direction: column; }
        .brand { font-weight: 600; color: #2d2d2d; }
        .tagline { font-size: 0.75rem; color: #9a9a9a; }
        .nav-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 44px;
            height: 44px;
            background: #f5d5d8;
            border-radius: 12px;
            color: #d4919a;
            text-decoration: none;
        }
        .admin-tabs {
            display: flex;
            border-bottom: 2px solid rgba(232, 180, 184, 0.2);
            margin-bottom: 20px;
        }
        .tab-btn {
            padding: 12px 24px;
            border: none;
            background: none;
            font-size: 1rem;
            font-weight: 500;
            color: #6b6b6b;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
        }
        .tab-btn.active {
            color: #d4919a;
            border-bottom-color: #d4919a;
        }
        .admin-tab-content {
            display: none;
            background: white;
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 2px 8px rgba(212, 145, 154, 0.15);
        }
        .admin-tab-content.active { display: block; }
        .section-title { font-size: 1.3rem; color: #2d2d2d; margin-bottom: 15px; }
        .calendar {
            background: #fdf8f8;
            padding: 16px;
            border-radius: 12px;
        }
        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .calendar-month { font-weight: 600; color: #2d2d2d; }
        .calendar-nav {
            width: 36px;
            height: 36px;
            border: none;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .calendar-weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            margin-bottom: 8px;
        }
        .calendar-weekdays span { font-size: 0.75rem; color: #9a9a9a; padding: 4px; }
        .calendar-days {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
        }
        .calendar-day {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            border: none;
            background: white;
            border-radius: 8px;
            cursor: pointer;
        }
        .calendar-day:hover { background: #f5d5d8; }
        .calendar-day.today { background: #d4919a; color: white; }
        .calendar-day.selected { background: #2d2d2d; color: white; }
        .calendar-day.disabled { color: #ddd; cursor: not-allowed; }
        .calendar-day.other-month { color: #ddd; }
        .agenda-title { font-size: 1.2rem; color: #2d2d2d; margin-bottom: 16px; }
        .agenda-badge {
            background: #f5d5d8;
            color: #d4919a;
            font-size: 0.75rem;
            padding: 4px 12px;
            border-radius: 999px;
        }
        .agenda-list { margin-top: 20px; }
        .agenda-card {
            display: flex;
            align-items: center;
            padding: 16px;
            background: #fdf8f8;
            border-radius: 12px;
            margin-bottom: 12px;
            border-left: 4px solid #d4919a;
        }
        .agenda-time { font-weight: 600; color: #d4919a; margin-right: 16px; min-width: 50px; }
        .agenda-info { flex: 1; }
        .agenda-info h4 { color: #2d2d2d; margin-bottom: 4px; }
        .agenda-info p { font-size: 0.85rem; color: #6b6b6b; }
        .agenda-actions { display: flex; gap: 8px; }
        .action-btn {
            width: 36px;
            height: 36px;
            border: none;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .action-btn:hover { background: #f5d5d8; }
        .action-btn.delete:hover { background: #fee2e2; }
        .empty-agenda {
            text-align: center;
            padding: 40px;
            color: #9a9a9a;
        }
        .primary-btn {
            background: #d4919a;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
        }
        .primary-btn:hover { background: #c4818a; }
        .services-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .services-admin-list { margin-top: 20px; }
        .service-admin-card {
            display: flex;
            align-items: center;
            padding: 16px;
            background: #fdf8f8;
            border-radius: 12px;
            margin-bottom: 12px;
            border-left: 4px solid #f5d5d8;
        }
        .service-admin-info { flex: 1; }
        .service-admin-info h4 { color: #2d2d2d; margin-bottom: 4px; }
        .service-admin-info p { font-size: 0.85rem; color: #6b6b6b; }
        .service-admin-price { font-weight: 600; color: #d4919a; margin-top: 8px; }
        .loading-indicator {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #9a9a9a;
        }
        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid #f5d5d8;
            border-top-color: #d4919a;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 10px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="admin-container">
        <header class="admin-header">
            <div class="logo">
                <svg class="logo-icon" viewBox="0 0 50 50" fill="none">
                    <circle cx="25" cy="25" r="23" stroke="currentColor" stroke-width="2"/>
                    <path d="M25 12C25 12 18 18 18 26C18 31 21 35 25 35C29 35 32 31 32 26C32 18 25 12 25 12Z" fill="currentColor" opacity="0.3"/>
                    <path d="M25 18V30M22 24H28" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
                <div class="logo-text">
                    <span class="brand">Admin Dashboard</span>
                    <span class="tagline">Jeci Vieira Nails</span>
                </div>
            </div>
            <a href="index.html" class="nav-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                    <polyline points="9 22 9 12 15 12 15 22"></polyline>
                </svg>
            </a>
        </header>

        <main id="app">
            <div class="admin-tabs">
                <button class="tab-btn active" onclick="switchAdminTab('agenda', this)">Agenda</button>
                <button class="tab-btn" onclick="switchAdminTab('servicos', this)">Serviços</button>
            </div>

            <!-- Tab Agenda -->
            <div id="tab-agenda" class="admin-tab-content active">
                <h2 class="section-title">Calendário de Agendamentos</h2>
                
                <div class="calendar">
                    <div class="calendar-header">
                        <button class="calendar-nav" onclick="changeAdminMonth(-1)">◀</button>
                        <span class="calendar-month" id="adminCalendarMonth"></span>
                        <button class="calendar-nav" onclick="changeAdminMonth(1)">▶</button>
                    </div>
                    <div class="calendar-weekdays">
                        <span>Dom</span><span>Seg</span><span>Ter</span><span>Qua</span><span>Qui</span><span>Sex</span><span>Sáb</span>
                    </div>
                    <div class="calendar-days" id="adminCalendarDays"></div>
                </div>
                
                <div id="loadingIndicator" class="loading-indicator">
                    <div class="spinner"></div>
                    <span>Carregando...</span>
                </div>
                
                <h3 class="agenda-title" style="margin-top: 20px;">
                    Agenda do Dia <span class="agenda-badge" id="agendaCount">0 agendamentos</span>
                </h3>
                <div class="agenda-list" id="agendaList">
                    <div class="empty-agenda">
                        <p>Nenhum agendamento para esta data.</p>
                    </div>
                </div>
            </div>

            <!-- Tab Serviços -->
            <div id="tab-servicos" class="admin-tab-content">
                <div class="services-header">
                    <h2 class="section-title">Gerenciar Serviços</h2>
                    <button class="primary-btn" onclick="openServiceModal()">+ Novo Serviço</button>
                </div>
                
                <div id="servicesLoadingIndicator" class="loading-indicator">
                    <div class="spinner"></div>
                    <span>Carregando serviços...</span>
                </div>

                <div class="services-admin-list" id="servicesAdminList">
                    <p style="text-align: center; color: #9a9a9a; padding: 40px;">Nenhum serviço cadastrado.</p>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal Serviço -->
    <div id="serviceModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000;">
        <div style="background: white; max-width: 500px; margin: 50px auto; padding: 30px; border-radius: 16px;">
            <h3 style="margin-bottom: 20px;" id="serviceModalTitle">Novo Serviço</h3>
            <form id="serviceForm">
                <div style="margin-bottom: 15px;">
                    <label style="display: block; margin-bottom: 5px; color: #6b6b6b;">ID do Serviço</label>
                    <input type="text" id="serviceId" required style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px;">
                </div>
                <div style="margin-bottom: 15px;">
                    <label style="display: block; margin-bottom: 5px; color: #6b6b6b;">Categoria</label>
                    <select id="serviceCategory" required style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px;">
                        <option value="manicure">Manicure & Pedicure</option>
                        <option value="podologia">Podologia</option>
                    </select>
                </div>
                <div style="margin-bottom: 15px;">
                    <label style="display: block; margin-bottom: 5px; color: #6b6b6b;">Nome</label>
                    <input type="text" id="serviceName" required style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px;">
                </div>
                <div style="margin-bottom: 15px;">
                    <label style="display: block; margin-bottom: 5px; color: #6b6b6b;">Descrição</label>
                    <textarea id="serviceDesc" rows="2" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px;"></textarea>
                </div>
                <div style="margin-bottom: 15px;">
                    <label style="display: block; margin-bottom: 5px; color: #6b6b6b;">Preço (R$)</label>
                    <input type="number" id="servicePrice" required style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px;">
                </div>
                <div style="margin-bottom: 15px;">
                    <label style="display: block; margin-bottom: 5px; color: #6b6b6b;">Duração (minutos)</label>
                    <input type="number" id="serviceDuration" required style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px;">
                </div>
                <div style="display: flex; gap: 10px; margin-top: 20px;">
                    <button type="submit" class="primary-btn" style="flex: 1;">Salvar</button>
                    <button type="button" onclick="closeServiceModal()" style="padding: 12px 24px; border: 1px solid #ddd; background: white; border-radius: 8px; cursor: pointer;">Cancelar</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // API URL
        const API_URL = 'https://us-central1-app-jeci-vieira-nails.cloudfunctions.net/api';
        
        // Variáveis globais
        let adminCurrentMonth = new Date().getMonth();
        let adminCurrentYear = new Date().getFullYear();
        let adminSelectedDate = null;
        let allAppointments = [];
        let blockedSchedules = [];
        let adminServices = [];
        
        // Inicialização
        document.addEventListener('DOMContentLoaded', () => {
            const today = new Date();
            adminSelectedDate = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;
            renderAdminCalendar();
            fetchAppointments();
            fetchBlockedSchedules();
        });
        
        // Funções de Tab
        function switchAdminTab(tabName, btn) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.admin-tab-content').forEach(content => content.classList.remove('active'));
            if (btn) btn.classList.add('active');
            document.getElementById(`tab-${tabName}`).classList.add('active');
            if (tabName === 'servicos' && adminServices.length === 0) {
                fetchAdminServices();
            }
        }
        
        // Calendário
        function renderAdminCalendar() {
            const monthNames = ['Janeiro', 'Fevereiro', 'Março', 'Abril', 'Maio', 'Junho', 'Julho', 'Agosto', 'Setembro', 'Outubro', 'Novembro', 'Dezembro'];
            document.getElementById('adminCalendarMonth').textContent = `${monthNames[adminCurrentMonth]} ${adminCurrentYear}`;
            
            const firstDay = new Date(adminCurrentYear, adminCurrentMonth, 1).getDay();
            const daysInMonth = new Date(adminCurrentYear, adminCurrentMonth + 1, 0).getDate();
            const daysInPrevMonth = new Date(adminCurrentYear, adminCurrentMonth, 0).getDate();
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            
            let html = '';
            
            // Dias do mês anterior
            for (let i = firstDay - 1; i >= 0; i--) {
                html += `<button class="calendar-day other-month" disabled>${daysInPrevMonth - i}</button>`;
            }
            
            // Dias do mês atual
            for (let day = 1; day <= daysInMonth; day++) {
                const date = new Date(adminCurrentYear, adminCurrentMonth, day);
                const dateStr = `${adminCurrentYear}-${String(adminCurrentMonth + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                let classes = 'calendar-day';
                if (date < today) classes += ' disabled';
                if (date.getTime() === today.getTime()) classes += ' today';
                if (adminSelectedDate === dateStr) classes += ' selected';
                html += `<button class="${classes}" onclick="selectAdminDate('${dateStr}', this)">${day}</button>`;
            }
            
            // Preencher restante
            const remaining = 42 - (firstDay + daysInMonth);
            for (let i = 1; i <= remaining; i++) {
                html += `<button class="calendar-day other-month" disabled>${i}</button>`;
            }
            
            document.getElementById('adminCalendarDays').innerHTML = html;
        }
        
        function changeAdminMonth(delta) {
            adminCurrentMonth += delta;
            if (adminCurrentMonth > 11) { adminCurrentMonth = 0; adminCurrentYear++; }
            if (adminCurrentMonth < 0) { adminCurrentMonth = 11; adminCurrentYear--; }
            renderAdminCalendar();
        }
        
        function selectAdminDate(dateStr, element) {
            adminSelectedDate = dateStr;
            document.querySelectorAll('.calendar-day').forEach(day => day.classList.remove('selected'));
            element.classList.add('selected');
            showAgendaForDate(dateStr);
        }
        
        // API Functions
        function fetchAppointments() {
            fetch(API_URL + '?action=getAgendamentos')
                .then(res => res.json())
                .then(data => {
                    allAppointments = Array.isArray(data) ? data : [];
                    document.getElementById('loadingIndicator').style.display = 'none';
                    renderAdminCalendar();
                    showAgendaForDate(adminSelectedDate);
                })
                .catch(err => {
                    console.error('Erro:', err);
                    document.getElementById('loadingIndicator').style.display = 'none';
                });
        }
        
        function fetchBlockedSchedules() {
            fetch(API_URL + '?action=getBloqueios')
                .then(res => res.json())
                .then(data => {
                    blockedSchedules = Array.isArray(data) ? data : [];
                    showAgendaForDate(adminSelectedDate);
                })
                .catch(err => console.error('Erro bloqueios:', err));
        }
        
        function fetchAdminServices() {
            document.getElementById('servicesLoadingIndicator').style.display = 'flex';
            fetch(API_URL + '?action=getServicos')
                .then(res => res.json())
                .then(data => {
                    adminServices = Array.isArray(data) ? data : [];
                    document.getElementById('servicesLoadingIndicator').style.display = 'none';
                    renderAdminServices();
                })
                .catch(err => {
                    console.error('Erro:', err);
                    document.getElementById('servicesLoadingIndicator').style.display = 'none';
                });
        }
        
        function renderAdminServices() {
            const container = document.getElementById('servicesAdminList');
            if (adminServices.length === 0) {
                container.innerHTML = '<p style="text-align: center; color: #9a9a9a; padding: 40px;">Nenhum serviço cadastrado.</p>';
                return;
            }
            container.innerHTML = adminServices.map(s => `
                <div class="service-admin-card">
                    <div class="service-admin-info">
                        <h4>${s.name}</h4>
                        <p>${s.description || 'Sem descrição'}</p>
                        <div class="service-admin-price">R$ ${parseFloat(s.price).toFixed(2)} • ${s.duration} min</div>
                    </div>
                    <div class="service-admin-actions">
                        <button class="action-btn" onclick="deleteService('${s.id}')" title="Excluir">🗑️</button>
                    </div>
                </div>
            `).join('');
        }
        
        function showAgendaForDate(dateStr) {
            const listEl = document.getElementById('agendaList');
            const dayApps = allAppointments.filter(app => String(app.data) === dateStr);
            document.getElementById('agendaCount').textContent = `${dayApps.length} agendamento(s)`;
            
            if (dayApps.length === 0) {
                listEl.innerHTML = '<div class="empty-agenda"><p>Nenhum agendamento para esta data.</p></div>';
                return;
            }
            
            listEl.innerHTML = dayApps.map(app => `
                <div class="agenda-card">
                    <div class="agenda-time">${app.hora || '--:--'}</div>
                    <div class="agenda-info">
                        <h4>${app.cliente || 'Sem nome'}</h4>
                        <p>${app.servico || 'Sem serviço'}</p>
                    </div>
                </div>
            `).join('');
        }
        
        // Modal Functions
        function openServiceModal() {
            document.getElementById('serviceId').value = '';
            document.getElementById('serviceName').value = '';
            document.getElementById('serviceDesc').value = '';
            document.getElementById('servicePrice').value = '';
            document.getElementById('serviceDuration').value = '30';
            document.getElementById('serviceModal').style.display = 'block';
        }
        
        function closeServiceModal() {
            document.getElementById('serviceModal').style.display = 'none';
        }
        
        document.getElementById('serviceForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const formData = new URLSearchParams({
                action: 'salvarServico',
                id: document.getElementById('serviceId').value,
                category: document.getElementById('serviceCategory').value,
                name: document.getElementById('serviceName').value,
                description: document.getElementById('serviceDesc').value,
                price: document.getElementById('servicePrice').value,
                duration: document.getElementById('serviceDuration').value,
                icon: 'circle'
            });
            
            fetch(API_URL, { method: 'POST', body: formData })
                .then(res => res.json())
                .then(data => {
                    if (data.sucesso) {
                        closeServiceModal();
                        fetchAdminServices();
                        alert('Serviço salvo com sucesso!');
                    } else {
                        alert(data.erro || 'Erro ao salvar');
                    }
                })
                .catch(err => {
                    console.error('Erro:', err);
                    alert('Erro ao salvar serviço');
                });
        });
        
        function deleteService(id) {
            if (!confirm('Excluir este serviço?')) return;
            fetch(API_URL + '?action=excluirServico&id=' + encodeURIComponent(id))
                .then(res => res.json())
                .then(data => {
                    if (data.sucesso) {
                        fetchAdminServices();
                    }
                })
                .catch(err => console.error('Erro:', err));
        }
    </script>
</body>
</html>
