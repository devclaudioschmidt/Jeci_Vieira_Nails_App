<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastre-se | Jeci Vieira Nails</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/style.css">
    <style>
        .login-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: var(--bg-gradient);
        }
        .login-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(232, 180, 184, 0.3);
            border-radius: var(--radius-lg);
            padding: 40px 30px;
            width: 100%;
            max-width: 400px;
            box-shadow: var(--shadow-lg);
            text-align: center;
            animation: fadeInUp 0.6s ease;
        }
        .login-logo {
            margin-bottom: 30px;
            color: var(--primary-dark);
        }
        .login-logo svg {
            width: 60px;
            height: 60px;
            margin-bottom: 10px;
        }
        .login-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            color: var(--secondary);
            margin-bottom: 8px;
        }
        .login-subtitle {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 30px;
        }
        .login-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
            text-align: left;
        }
        .form-input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .form-input-group label {
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-secondary);
        }
        .login-input {
            padding: 14px 16px;
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(232, 180, 184, 0.4);
            border-radius: var(--radius-sm);
            font-family: inherit;
            font-size: 1rem;
            transition: var(--transition);
        }
        .login-input:focus {
            outline: none;
            border-color: var(--primary-dark);
            box-shadow: 0 0 0 4px rgba(232, 180, 184, 0.2);
        }
        .login-btn {
            background: var(--primary-dark);
            color: white;
            padding: 16px;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .login-btn:hover {
            background: var(--secondary);
        }
        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .error-message {
            background: rgba(229, 62, 62, 0.1);
            color: #e53e3e;
            padding: 12px;
            border-radius: var(--radius-sm);
            font-size: 0.9rem;
            margin-bottom: 16px;
            display: none;
        }
        .success-message {
            background: rgba(34, 154, 74, 0.1);
            color: #229a4e;
            padding: 12px;
            border-radius: var(--radius-sm);
            font-size: 0.9rem;
            margin-bottom: 16px;
            display: none;
        }
        .back-to-site {
            display: block;
            margin-top: 20px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
        }
        .back-to-site:hover {
            color: var(--primary-dark);
        }
        .have-account {
            display: block;
            margin-top: 16px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
        }
        .have-account:hover {
            color: var(--primary-dark);
        }
        .spinner-inner {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="login-page">
    <div class="login-card">
        <div class="login-logo">
            <svg viewBox="0 0 50 50" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="25" cy="25" r="23" stroke="currentColor" stroke-width="2"/>
                <path d="M25 12C25 12 18 18 18 26C18 31 21 35 25 35C29 35 32 31 32 26C32 18 25 12 25 12Z" fill="currentColor" opacity="0.3"/>
                <path d="M25 18V30M22 24H28" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
            <h1 class="login-title">Criar Conta</h1>
            <p class="login-subtitle">Jeci Vieira Nails & Podologia</p>
        </div>

        <div id="errorMessage" class="error-message"></div>
        <div id="successMessage" class="success-message"></div>

        <form id="cadastroForm" class="login-form">
            <div class="form-input-group">
                <label for="nome">Nome Completo</label>
                <input type="text" id="nome" class="login-input" placeholder="Seu nome completo" required autocomplete="name">
            </div>
            <div class="form-input-group">
                <label for="email">Email</label>
                <input type="email" id="email" class="login-input" placeholder="seu@email.com" required autocomplete="email">
            </div>
            <div class="form-input-group">
                <label for="telefone">WhatsApp (com DDI)</label>
                <input type="tel" id="telefone" class="login-input" placeholder="+55 (11) 99999-9999" required autocomplete="tel">
            </div>
            <div class="form-input-group">
                <label for="password">Senha</label>
                <input type="password" id="password" class="login-input" placeholder="Mínimo 6 caracteres" required minlength="6" autocomplete="new-password">
            </div>
            <div class="form-input-group">
                <label for="confirmPassword">Confirmar Senha</label>
                <input type="password" id="confirmPassword" class="login-input" placeholder="Repita a senha" required minlength="6" autocomplete="new-password">
            </div>
            <button type="submit" id="cadastroBtn" class="login-btn">
                <span>Criar Conta</span>
                <div class="spinner-inner" id="cadastroSpinner"></div>
            </button>
        </form>

        <a href="login.html" class="have-account">Já tem conta? Fazer login</a>
        <a href="index.html" class="back-to-site">← Agendar sem conta</a>
    </div>

    <script src="config.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script>
        const API_URL = 'https://us-central1-app-jeci-vieira-nails.cloudfunctions.net/api';

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        document.getElementById('cadastroForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const nome = document.getElementById('nome').value.trim();
            const email = document.getElementById('email').value.trim();
            const telefone = document.getElementById('telefone').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const btn = document.getElementById('cadastroBtn');
            const spinner = document.getElementById('cadastroSpinner');
            const errorMsg = document.getElementById('errorMessage');

            errorMsg.style.display = 'none';

            if (password !== confirmPassword) {
                errorMsg.textContent = 'As senhas não conferem.';
                errorMsg.style.display = 'block';
                return;
            }

            if (password.length < 6) {
                errorMsg.textContent = 'A senha deve ter pelo menos 6 caracteres.';
                errorMsg.style.display = 'block';
                return;
            }

            btn.disabled = true;
            spinner.style.display = 'block';

            try {
                const userCredential = await auth.createUserWithEmailAndPassword(email, password);
                const user = userCredential.user;

                await user.updateProfile({
                    displayName: nome
                });

                await saveClienteData(user.uid, {
                    nome: nome,
                    email: email,
                    telefone: telefone
                });

                localStorage.setItem('cliente_uid', user.uid);
                localStorage.setItem('cliente_nome', nome);
                localStorage.setItem('cliente_email', email);
                localStorage.setItem('cliente_telefone', telefone);

                window.location.href = 'cliente.html';
            } catch (error) {
                btn.disabled = false;
                spinner.style.display = 'none';
                
                let errorMessage = 'Erro ao criar conta.';
                if (error.code === 'auth/email-already-in-use') {
                    errorMessage = 'Este email já está cadastrado.';
                } else if (error.code === 'auth/invalid-email') {
                    errorMessage = 'Email inválido.';
                } else if (error.code === 'auth/weak-password') {
                    errorMessage = 'Senha muito fraca.';
                }
                errorMsg.textContent = errorMessage;
                errorMsg.style.display = 'block';
            }
        });

        async function saveClienteData(uid, data) {
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        action: 'saveCliente',
                        uid: uid,
                        nome: data.nome,
                        email: data.email,
                        telefone: data.telefone
                    })
                });
                return await response.json();
            } catch (error) {
                console.error('Erro ao salvar dados do cliente:', error);
            }
        }
    document.getElementById('telefone').addEventListener('input', function(e) {
            let value = e.target.value.replace(/\D/g, '');
            if (value.length > 0) {
                if (!value.startsWith('55')) {
                    value = '55' + value;
                }
                if (value.length > 13) value = value.slice(0, 13);
                
                if (value.length <= 2) {
                    value = '+' + value;
                } else if (value.length <= 4) {
                    value = '+' + value.slice(0, 2) + ' (' + value.slice(2);
                } else if (value.length <= 9) {
                    value = '+' + value.slice(0, 2) + ' (' + value.slice(2, 3) + ') ' + value.slice(3);
                } else {
                    value = '+' + value.slice(0, 2) + ' (' + value.slice(2, 4) + ') ' + value.slice(4, 9) + '-' + value.slice(9);
                }
            }
            e.target.value = value;
        });
    </script>
</body>
</html>
