<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#d4919a">
    <meta name="description" content="Área do cliente - Jeci Vieira Nails">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Minha Conta | Jeci Vieira Nails</title>
    <link rel="manifest" href="manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/style.css">
    <style>
        :root {
            --primary: #e8b4b8;
            --primary-dark: #d4919a;
            --primary-light: #f5d5d8;
            --secondary: #2d2d2d;
            --accent: #c9a87c;
            --accent-light: #e8d4b8;
            --bg-main: #fdf8f8;
            --bg-card: #ffffff;
            --bg-gradient: linear-gradient(135deg, #fdf8f8 0%, #f5e6e8 100%);
            --text-primary: #2d2d2d;
            --text-secondary: #6b6b6b;
            --text-muted: #9a9a9a;
            --shadow-sm: 0 2px 8px rgba(212, 145, 154, 0.15);
            --shadow-md: 0 4px 20px rgba(212, 145, 154, 0.2);
            --shadow-lg: 0 8px 40px rgba(212, 145, 154, 0.25);
            --radius-sm: 12px;
            --radius-md: 16px;
            --radius-lg: 24px;
            --radius-full: 9999px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg-gradient); min-height: 100vh; }
        
        .client-header {
            background: white;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow-sm);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .client-logo { display: flex; align-items: center; gap: 12px; }
        .client-logo-icon { width: 40px; height: 40px; color: var(--primary-dark); }
        .client-logo-text { display: flex; flex-direction: column; }
        .client-brand { font-weight: 600; color: var(--secondary); font-size: 1rem; }
        .client-tagline { font-size: 0.7rem; color: var(--text-muted); }
        .logout-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 8px;
        }
        
        .client-container { max-width: 500px; margin: 0 auto; padding: 20px; }
        
        .welcome-card {
            background: white;
            border-radius: var(--radius-md);
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: var(--shadow-md);
        }
        .welcome-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            color: var(--secondary);
            margin-bottom: 4px;
        }
        .welcome-subtitle {
            color: var(--text-muted);
            font-size: 0.9rem;
        }
        
        .next-appointment {
            background: linear-gradient(135deg, var(--primary-dark) 0%, #c07c85 100%);
            color: white;
            border-radius: var(--radius-md);
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: var(--shadow-lg);
        }
        .next-appointment-label {
            font-size: 0.8rem;
            opacity: 0.8;
            margin-bottom: 8px;
        }
        .next-appointment-service {
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem;
            margin-bottom: 12px;
        }
        .next-appointment-details {
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 0.95rem;
        }
        .next-appointment-date, .next-appointment-time {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .next-appointment-actions {
            margin-top: 16px;
            display: flex;
            gap: 10px;
        }
        .next-action-btn {
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 8px 16px;
            border-radius: var(--radius-sm);
            font-size: 0.85rem;
            cursor: pointer;
            transition: var(--transition);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .next-action-btn:hover {
            background: rgba(255,255,255,0.3);
        }
        
        .client-menu {
            background: white;
            border-radius: var(--radius-md);
            padding: 20px;
            box-shadow: var(--shadow-md);
        }
        .menu-title {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .menu-items { display: flex; flex-direction: column; gap: 8px; }
        .menu-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px;
            border-radius: var(--radius-sm);
            text-decoration: none;
            color: var(--text-primary);
            transition: var(--transition);
            cursor: pointer;
        }
        .menu-item:hover {
            background: var(--primary-light);
        }
        .menu-icon {
            width: 44px;
            height: 44px;
            background: var(--primary-light);
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary-dark);
            flex-shrink: 0;
        }
        .menu-icon svg {
            width: 22px;
            height: 22px;
        }
        .menu-item svg {
            width: 24px;
            height: 24px;
            color: var(--primary-dark);
        }
        .menu-item-text {
            flex: 1;
            font-weight: 500;
        }
        .menu-item-arrow {
            color: var(--text-muted);
        }
        
        .whatsapp-fab {
            position: fixed;
            bottom: 24px;
            right: 24px;
            width: 56px;
            height: 56px;
            background: #25D366;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--shadow-lg);
            cursor: pointer;
            z-index: 1000;
            text-decoration: none;
        }
        .whatsapp-fab svg {
            width: 28px;
            height: 28px;
            color: white;
        }
        
        .no-appointment {
            text-align: center;
            padding: 20px;
            color: var(--text-muted);
        }
        
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--primary-light);
            border-top-color: var(--primary-dark);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 40px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <header class="client-header">
        <div class="client-logo">
            <svg class="client-logo-icon" viewBox="0 0 50 50" fill="none">
                <circle cx="25" cy="25" r="23" stroke="currentColor" stroke-width="2"/>
                <path d="M25 12C25 12 18 18 18 26C18 31 21 35 25 35C29 35 32 31 32 26C32 18 25 12 25 12Z" fill="currentColor" opacity="0.3"/>
                <path d="M25 18V30M22 24H28" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
            <div class="client-logo-text">
                <span class="client-brand">Jeci Nails</span>
                <span class="client-tagline">Minha Conta</span>
            </div>
        </div>
        <button onclick="logout()" class="logout-btn" title="Sair">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                <polyline points="16 17 21 12 16 7"></polyline>
                <line x1="21" y1="12" x2="9" y2="12"></line>
            </svg>
        </button>
    </header>

    <div class="client-container">
        <div class="welcome-card">
            <h1 class="welcome-title">Olá, <span id="clienteNome">Cliente</span>!</h1>
            <p class="welcome-subtitle">Bem-vindo de volta ao Jeci Vieira Nails</p>
        </div>

        <div id="nextAppointmentSection">
            <div class="next-appointment">
                <div class="next-appointment-label">PRÓXIMO AGENDAMENTO</div>
                <div class="next-appointment-service" id="nextService">Carregando...</div>
                <div class="next-appointment-details">
                    <div class="next-appointment-date" id="nextDate"></div>
                    <div class="next-appointment-time" id="nextTime"></div>
                </div>
                <div class="next-appointment-actions">
                    <button class="next-action-btn" onclick="cancelNextAppointment()">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="18" y1="6" x2="6" y2="18"></line>
                            <line x1="6" y1="6" x2="18" y2="18"></line>
                        </svg>
                        Cancelar
                    </button>
                    <a href="agendamento.html" class="next-action-btn">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                            <line x1="16" y1="2" x2="16" y2="6"></line>
                            <line x1="8" y1="2" x2="8" y2="6"></line>
                            <line x1="3" y1="10" x2="21" y2="10"></line>
                        </svg>
                        Reagendar
                    </a>
                </div>
            </div>
        </div>
        <div id="noAppointmentSection" class="next-appointment" style="display: none; background: white; border: 2px dashed var(--primary-light);">
            <div class="no-appointment">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="1.5" style="margin-bottom: 12px; opacity: 0.5;">
                    <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                    <line x1="16" y1="2" x2="16" y2="6"></line>
                    <line x1="8" y1="2" x2="8" y2="6"></line>
                    <line x1="3" y1="10" x2="21" y2="10"></line>
                </svg>
                <p style="color: var(--text-muted); margin-bottom: 16px;">Você não tem agendamento marcado</p>
                <a href="agendamento.html" class="next-action-btn" style="background: var(--primary-dark); color: white; display: inline-flex; justify-content: center;">
                    Agendar Novo Horário
                </a>
            </div>
        </div>

        <div class="client-menu" style="margin-top: 20px;">
            <div class="menu-title">Minhas Opções</div>
            <div class="menu-items">
                <a href="agendamento.html" class="menu-item">
                    <div class="menu-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                            <line x1="16" y1="2" x2="16" y2="6"/>
                            <line x1="8" y1="2" x2="8" y2="6"/>
                            <line x1="3" y1="10" x2="21" y2="10"/>
                        </svg>
                    </div>
                    <span class="menu-item-text">Novo Agendamento</span>
                    <svg class="menu-item-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 18L15 12L9 6"/>
                    </svg>
                </a>
                <a href="historico.html" class="menu-item">
                    <div class="menu-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10"/>
                            <path d="M12 6V12L16 14"/>
                        </svg>
                    </div>
                    <span class="menu-item-text">Meu Histórico</span>
                    <svg class="menu-item-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 18L15 12L9 6"/>
                    </svg>
                </a>
                <a href="perfil.html" class="menu-item">
                    <div class="menu-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                            <circle cx="12" cy="7" r="4"/>
                        </svg>
                    </div>
                    <span class="menu-item-text">Meu Perfil</span>
                    <svg class="menu-item-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 18L15 12L9 6"/>
                    </svg>
                </a>
            </div>
        </div>
    </div>

    <a href="#" id="whatsappFab" class="whatsapp-fab" target="_blank" style="display: none;">
        <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.148-.66-1.6-.906-2.166-.244-.565-.497-1.003-.713-1.166-.218-.164-.487-.198-.664-.198-.177 0-.389.025-.56.149-.173.124-.297.298-.297.398-.075.198.298.571.446.721.149.149.32.347.492.496.173.149.297.223.446.124.149-.099.62-.497 1.03-.793.296-.219.62-.348.88-.347.248-.002.492-.025.698-.025.209 0 .497-.05.716-.248.22-.199.446-.496.571-.743.124-.248.049-.495-.025-.694-.075-.198-.645-1.556-.906-2.105-.248-.547-.468-.96-.66-1.123-.193-.163-.345-.248-.496-.273-.149-.025-.297-.025-.446-.025-.148 0-.371.025-.496.173zM12 22c2.763 0 5-2.239 5-5s-2.237-5-5-5-5 2.239-5 5 2.238 5 5 5z"/>
        </svg>
    </a>

    <script src="config.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script>
        const API_URL = 'https://us-central1-app-jeci-vieira-nails.cloudfunctions.net/api';
        
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        const clienteUid = localStorage.getItem('cliente_uid');
        
        async function checkAuth() {
            if (!clienteUid) {
                window.location.href = 'login.html';
                return;
            }

            const clienteNome = localStorage.getItem('cliente_nome') || 'Cliente';
            document.getElementById('clienteNome').textContent = clienteNome.split(' ')[0];

            auth.onAuthStateChanged((user) => {
                if (!user) {
                    localStorage.clear();
                    window.location.href = 'login.html';
                }
            });
        }

        checkAuth();

        async function loadSalaoData() {
            try {
                const response = await fetch(API_URL + '?action=getSalaoPublico');
                const data = await response.json();
                
                if (data.telefone) {
                    const whatsappFab = document.getElementById('whatsappFab');
                    const cleanPhone = data.telefone.replace(/\D/g, '');
                    const message = encodeURIComponent('Olá! Gostaria de mais informações sobre os serviços.');
                    whatsappFab.href = `https://wa.me/${cleanPhone}?text=${message}`;
                    whatsappFab.style.display = 'flex';
                }
            } catch (error) {
                console.error('Erro ao carregar dados do salão:', error);
            }
        }

        async function loadNextAppointment() {
            if (!clienteUid) return;
            
            try {
                const response = await fetch(API_URL + '?action=getClientAppointments&uid=' + clienteUid);
                const appointments = await response.json();
                
                const now = new Date();
                const nextAppointments = appointments
                    .filter(app => {
                        const appDate = new Date(app.data + 'T' + app.hora);
                        return appDate >= now && app.status === 'confirmado';
                    })
                    .sort((a, b) => {
                        return new Date(a.data + 'T' + a.hora) - new Date(b.data + 'T' + b.hora);
                    });

                if (nextAppointments.length > 0) {
                    const next = nextAppointments[0];
                    document.getElementById('nextService').textContent = next.servico;
                    
                    const dateParts = next.data.split('-');
                    const formattedDate = `${dateParts[2]}/${dateParts[1]}/${dateParts[0]}`;
                    document.getElementById('nextDate').innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg> ${formattedDate}`;
                    document.getElementById('nextTime').innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg> ${next.hora}`;
                    
                    window.currentNextAppointment = next;
                    document.getElementById('nextAppointmentSection').style.display = 'block';
                    document.getElementById('noAppointmentSection').style.display = 'none';
                } else {
                    document.getElementById('nextAppointmentSection').style.display = 'none';
                    document.getElementById('noAppointmentSection').style.display = 'block';
                }
            } catch (error) {
                console.error('Erro ao carregar próximo agendamento:', error);
                document.getElementById('nextAppointmentSection').style.display = 'none';
                document.getElementById('noAppointmentSection').style.display = 'block';
            }
        }

        window.cancelNextAppointment = function() {
            const next = window.currentNextAppointment;
            if (!next) return;
            
            const appDateTime = new Date(next.data + 'T' + next.hora);
            const now = new Date();
            const hoursDiff = (appDateTime - now) / (1000 * 60 * 60);
            
            if (hoursDiff < 24) {
                alert('Cancelamento permitido apenas com antecedência de 24 horas.');
                return;
            }
            
            if (confirm(`Deseja cancelar o agendamento de ${next.servico} no dia ${next.data} às ${next.hora}?`)) {
                fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        action: 'cancelarAgendamento',
                        data: next.data,
                        hora: next.hora
                    })
                })
                .then(res => res.json())
                .then(result => {
                    if (result.sucesso) {
                        alert('Agendamento cancelado com sucesso!');
                        loadNextAppointment();
                    } else {
                        alert(result.erro || 'Erro ao cancelar');
                    }
                })
                .catch(err => {
                    console.error(err);
                    alert('Erro ao cancelar');
                });
            }
        };

        window.logout = function() {
            auth.signOut().then(() => {
                localStorage.removeItem('cliente_uid');
                localStorage.removeItem('cliente_nome');
                localStorage.removeItem('cliente_email');
                localStorage.removeItem('cliente_telefone');
                window.location.href = 'login.html';
            });
        };

        loadSalaoData();
        loadNextAppointment();
    </script>
</body>
</html>
