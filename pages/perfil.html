<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <!-- ================================================
         META TAGS E CONFIGURAÇÕES
         ================================================ -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Perfil - Jeci Vieira Nails</title>
    
    <!-- Meta tags para PWA -->
    <meta name="theme-color" content="#C98B8B">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Jeci Vieira Nails">
    <meta name="mobile-web-app-capable" content="yes">
    
    <!-- Favicon e ícone para PWA -->
    <link rel="icon" type="image/svg+xml" href="../data/img/favicon.svg">
    <link rel="apple-touch-icon" href="../data/img/icons/icon-192x192.png">
    
    <!-- Arquivo Manifest PWA -->
    <link rel="manifest" href="../assets/manifest/manifest.json">
    
    <!-- Pré-conexão com Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <!-- Fontes: Montserrat e Playfair Display -->
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&family=Playfair+Display:wght@500;600;700&display=swap">
    
    <!-- Estilos CSS -->
    <link rel="stylesheet" href="../css/style-perfil.css">
</head>

<!-- ================================================
     CORPO DA PÁGINA
     ================================================ -->
<body>
    <!-- Card de carregamento -->
    <div class="card-perfil" id="card-carregamento" style="display: none;">
        <p class="mensagemCarregando" id="status">Carregando dados...</p>
    </div>
    
    <!-- ================================================
         SCRIPTS DO FIREBASE
         ================================================ -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    
    <!-- Configuração do Firebase -->
    <script src="../assets/js/firebase-config.js"></script>
    
    <!-- ================================================
         SCRIPTS DO APLICATIVO
         ================================================ -->
    <!-- Lógica da página de perfil (ignorar backend, apenas UI) -->
    <script src="../assets/js/perfil.js"></script>
    
    <!-- Script para renderizar página após verificação -->
    <script>
        // Aguardar Firebase iniciar e renderizar estrutura
        function initPerfil() {
            const status = document.getElementById('status');
            
            firebase.auth().onAuthStateChanged(async (usuario) => {
                if (!usuario) {
                    status.textContent = 'Você precisa estar logado. Redirecionando...';
                    setTimeout(() => {
                        window.location.href = '../index.html';
                    }, 1500);
                    return;
                }
                
                // Renderizar estrutura
                renderizarEstruturaPerfil();
            });
        }
        
        function renderizarEstruturaPerfil() {
            document.body.innerHTML = `
                <!-- Header fixo -->
                <header class="header-perfil">
                    <a href="dashboard.html" class="logo-header">
                        <img src="../data/img/favicon.svg" alt="Jeci Nails">
                        <span class="texto-logo">Jeci Nails</span>
                    </a>
                    <a href="dashboard.html" class="botao-voltar">←</a>
                </header>
                
                <!-- Container principal -->
                <main class="container-perfil">
                    
                    <h1 class="titulo-pagina">Meu Perfil</h1>
                    <p class="subtitulo-pagina">Atualize seus dados de contato</p>
                    
                    <!-- Card de perfil -->
                    <div class="card-perfil">
                        <h2 class="titulo-card">Dados Pessoais</h2>
                        
                        <!-- Formulário de perfil -->
                        <form id="formPerfil">
                            
                            <!-- Campo: Nome (apenas leitura) -->
                            <div class="campo-formulario-perfil">
                                <label class="label-campo-perfil" for="campoNome">Nome Completo</label>
                                <input type="text" id="campoNome" name="nome" 
                                    class="input-campo-perfil input-campo-perfil.somente-leitura" 
                                    placeholder="Seu nome completo" autocomplete="name" readonly>
                            </div>
                            
                            <!-- Campo: Email (apenas leitura) -->
                            <div class="campo-formulario-perfil">
                                <label class="label-campo-perfil" for="campoEmail">E-mail</label>
                                <input type="email" id="campoEmail" name="email" 
                                    class="input-campo-perfil input-campo-perfil.somente-leitura" 
                                    placeholder="seu@email.com" autocomplete="email" readonly>
                            </div>
                            
                            <!-- Campo: Telefone -->
                            <div class="campo-formulario-perfil">
                                <label class="label-campo-perfil" for="campoTelefone">Telefone</label>
                                <input type="tel" id="campoTelefone" name="telefone" 
                                    class="input-campo-perfil" 
                                    placeholder="(11) 99999-9999" autocomplete="tel">
                            </div>
                            
                            <!-- Campo: Data de Nascimento -->
                            <div class="campo-formulario-perfil">
                                <label class="label-campo-perfil" for="campoDataNascimento">Data de Nascimento</label>
                                <input type="text" id="campoDataNascimento" name="dataNascimento" 
                                    class="input-campo-perfil" 
                                    placeholder="DD/MM/AAAA" autocomplete="bday">
                            </div>
                            
                            <!-- Botão de salvar -->
                            <button type="submit" class="botao-salvar-perfil">
                                Salvar Alterações
                            </button>
                        </form>
                        
                        <!-- Link para voltar -->
                        <div class="link-voltar">
                            <a href="dashboard.html">← Voltar ao Dashboard</a>
                        </div>
                    </div>
                </main>
            `;
            
            // Chamar lógica original do perfil.js
            if (typeof inicializarPerfil === 'function') {
                inicializarPerfil();
            }
        }
        
        // Iniciar quando página carregar
        initPerfil();
    </script>
</body>

</html>
