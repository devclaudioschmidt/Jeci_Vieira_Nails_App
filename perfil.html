<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#d4919a">
    <title>Meu Perfil | Jeci Vieira Nails</title>
    <link rel="manifest" href="manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/style.css">
    <style>
        :root {
            --primary: #e8b4b8;
            --primary-dark: #d4919a;
            --primary-light: #f5d5d8;
            --secondary: #2d2d2d;
            --bg-main: #fdf8f8;
            --bg-card: #ffffff;
            --bg-gradient: linear-gradient(135deg, #fdf8f8 0%, #f5e6e8 100%);
            --text-primary: #2d2d2d;
            --text-secondary: #6b6b6b;
            --text-muted: #9a9a9a;
            --shadow-sm: 0 2px 8px rgba(212, 145, 154, 0.15);
            --shadow-md: 0 4px 20px rgba(212, 145, 154, 0.2);
            --radius-sm: 12px;
            --radius-md: 16px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg-gradient); min-height: 100vh; }
        
        .client-header {
            background: white;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: var(--shadow-sm);
        }
        .back-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 8px;
        }
        .client-logo { display: flex; align-items: center; gap: 12px; flex: 1; }
        .client-logo-icon { width: 36px; height: 36px; color: var(--primary-dark); }
        .client-logo-text { font-weight: 600; font-size: 1rem; color: var(--secondary); }
        
        .profile-container { max-width: 500px; margin: 0 auto; padding: 20px; }
        
        .profile-form {
            background: white;
            border-radius: var(--radius-md);
            padding: 24px;
            box-shadow: var(--shadow-md);
        }
        .profile-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            color: var(--secondary);
            margin-bottom: 24px;
        }
        .form-group { margin-bottom: 20px; }
        .form-label {
            display: block;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }
        .form-input {
            width: 100%;
            padding: 14px 16px;
            background: var(--bg-main);
            border: 1px solid rgba(232, 180, 184, 0.4);
            border-radius: var(--radius-sm);
            font-family: inherit;
            font-size: 1rem;
            transition: var(--transition);
        }
        .form-input:focus {
            outline: none;
            border-color: var(--primary-dark);
            box-shadow: 0 0 0 4px rgba(232, 180, 184, 0.2);
        }
        
        .save-btn {
            background: var(--primary-dark);
            color: white;
            border: none;
            padding: 16px;
            border-radius: var(--radius-sm);
            width: 100%;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 10px;
        }
        .save-btn:hover { background: var(--secondary); }
        .save-btn:disabled { opacity: 0.6; cursor: not-allowed; }
        
        .logout-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #e53e3e;
            text-decoration: none;
            font-size: 0.9rem;
            cursor: pointer;
        }
        .logout-link:hover { text-decoration: underline; }
        
        .success-message {
            background: rgba(34, 154, 74, 0.1);
            color: #229a4e;
            padding: 12px;
            border-radius: var(--radius-sm);
            font-size: 0.9rem;
            margin-bottom: 16px;
            display: none;
        }
        
        .whatsapp-fab {
            position: fixed;
            bottom: 24px;
            right: 24px;
            width: 56px;
            height: 56px;
            background: #25D366;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--shadow-md);
            cursor: pointer;
            z-index: 1000;
            text-decoration: none;
        }
        .whatsapp-fab svg { width: 28px; height: 28px; color: white; }
    </style>
</head>
<body>
    <header class="client-header">
        <button onclick="window.location.href='cliente.html'" class="back-btn">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M19 12H5M12 19L5 12L12 5"/>
            </svg>
        </button>
        <div class="client-logo">
            <svg class="client-logo-icon" viewBox="0 0 50 50" fill="none">
                <circle cx="25" cy="25" r="23" stroke="currentColor" stroke-width="2"/>
                <path d="M25 12C25 12 18 18 18 26C18 31 21 35 25 35C29 35 32 31 32 26C32 18 25 12 25 12Z" fill="currentColor" opacity="0.3"/>
            </svg>
            <span class="client-logo-text">Perfil</span>
        </div>
    </header>

    <div class="profile-container">
        <form class="profile-form" id="profileForm">
            <h1 class="profile-title">Meu Perfil</h1>
            
            <div id="successMessage" class="success-message">Dados salvos com sucesso!</div>
            
            <div class="form-group">
                <label class="form-label">Nome Completo</label>
                <input type="text" id="nome" class="form-input" placeholder="Seu nome" required>
            </div>
            
            <div class="form-group">
                <label class="form-label">Email</label>
                <input type="email" id="email" class="form-input" placeholder="seu@email.com" required>
            </div>
            
            <div class="form-group">
                <label class="form-label">WhatsApp</label>
                <input type="tel" id="telefone" class="form-input" placeholder="+5511999999999">
            </div>
            
            <button type="submit" class="save-btn">Salvar Alterações</button>
        </form>
        
        <a onclick="logout()" class="logout-link">Sair da minha conta</a>
    </div>

    <a href="#" id="whatsappFab" class="whatsapp-fab" target="_blank" style="display: none;">
        <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.148-.66-1.6-.906-2.166-.244-.565-.497-1.003-.713-1.166-.218-.164-.487-.198-.664-.198-.177 0-.389.025-.56.149-.173.124-.297.298-.297.398-.075.198.298.571.446.721.149.149.32.347.492.496.173.149.297.223.446.124.149-.099.62-.497 1.03-.793.296-.219.62-.348.88-.347.248-.002.492-.025.698-.025.209 0 .497-.05.716-.248.22-.199.446-.496.571-.743.124-.248.049-.495-.025-.694-.075-.198-.645-1.556-.906-2.105-.248-.547-.468-.96-.66-1.123-.193-.163-.345-.248-.496-.273-.149-.025-.297-.025-.446-.025-.148 0-.371.025-.496.173zM12 22c2.763 0 5-2.239 5-5s-2.237-5-5-5-5 2.239-5 5 2.238 5 5 5z"/>
        </svg>
    </a>

    <script src="config.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script>
        const API_URL = 'https://us-central1-app-jeci-vieira-nails.cloudfunctions.net/api';
        
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        const clienteUid = localStorage.getItem('cliente_uid');
        if (!clienteUid) {
            window.location.href = 'login.html';
        }

        document.getElementById('nome').value = localStorage.getItem('cliente_nome') || '';
        document.getElementById('email').value = localStorage.getItem('cliente_email') || '';
        document.getElementById('telefone').value = localStorage.getItem('cliente_telefone') || '';
        if (document.getElementById('telefone').value) {
            document.getElementById('telefone').dispatchEvent(new Event('input'));
        }

        document.getElementById('telefone').addEventListener('input', function(e) {
            let value = e.target.value.replace(/\D/g, '');
            if (value.length <= 2) {
                value = value.replace(/^(\d{1,2})/, '($1');
            } else if (value.length <= 6) {
                value = value.replace(/^(\d{2})(\d{1,4})/, '($1) $2');
            } else if (value.length <= 10) {
                value = value.replace(/^(\d{2})(\d{4})(\d{1,4})/, '($1) $2-$3');
            } else {
                value = value.replace(/^(\d{2})(\d{5})(\d{1,4}).*/, '($1) $2-$3');
            }
            e.target.value = value;
        });

        document.getElementById('email').addEventListener('input', function(e) {
            e.target.value = e.target.value.toLowerCase();
        });

        document.getElementById('profileForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const btn = e.target.querySelector('.save-btn');
            btn.disabled = true;
            btn.textContent = 'Salvando...';
            
            const data = {
                action: 'updateCliente',
                uid: clienteUid,
                nome: document.getElementById('nome').value,
                telefone: document.getElementById('telefone').value,
                email: document.getElementById('email').value
            };
            
            try {
                const user = auth.currentUser;
                if (user && user.email !== data.email) {
                    await user.updateEmail(data.email);
                }

                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await response.json();
                
                if (result.sucesso || result.nome) {
                    localStorage.setItem('cliente_nome', data.nome);
                    localStorage.setItem('cliente_telefone', data.telefone);
                    localStorage.setItem('cliente_email', data.email);
                    
                    if (user) {
                        await user.updateProfile({ displayName: data.nome });
                    }
                    
                    document.getElementById('successMessage').style.display = 'block';
                    setTimeout(() => {
                        document.getElementById('successMessage').style.display = 'none';
                    }, 3000);
                }
            } catch (error) {
                console.error('Erro ao salvar:', error);
                if (error.code === 'auth/requires-recent-login') {
                    alert('Para alterar seu email, por segurança você precisa sair e fazer login novamente.');
                } else if (error.code === 'auth/email-already-in-use') {
                    alert('Este email já está sendo utilizado por outra conta.');
                } else {
                    alert('Erro ao salvar dados.');
                }
            }
            
            btn.disabled = false;
            btn.textContent = 'Salvar Alterações';
        });

        window.logout = function() {
            if (confirm('Deseja realmente sair da sua conta?')) {
                auth.signOut().then(() => {
                    localStorage.removeItem('cliente_uid');
                    localStorage.removeItem('cliente_nome');
                    localStorage.removeItem('cliente_email');
                    localStorage.removeItem('cliente_telefone');
                    window.location.href = 'login.html';
                });
            }
        };

        async function loadSalaoData() {
            try {
                const response = await fetch(API_URL + '?action=getSalaoPublico');
                const data = await response.json();
                
                if (data.telefone) {
                    const whatsappFab = document.getElementById('whatsappFab');
                    const cleanPhone = data.telefone.replace(/\D/g, '');
                    const message = encodeURIComponent('Olá! Gostaria de mais informações.');
                    whatsappFab.href = `https://wa.me/${cleanPhone}?text=${message}`;
                    whatsappFab.style.display = 'flex';
                }
            } catch (error) {
                console.error('Erro ao carregar dados do salão:', error);
            }
        }

        loadSalaoData();
    </script>
</body>
</html>
