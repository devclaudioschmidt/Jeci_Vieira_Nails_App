<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#d4919a">
    <title>Meu Histórico | Jeci Vieira Nails</title>
    <link rel="manifest" href="manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/style.css">
    <style>
        :root {
            --primary: #e8b4b8;
            --primary-dark: #d4919a;
            --primary-light: #f5d5d8;
            --secondary: #2d2d2d;
            --bg-main: #fdf8f8;
            --bg-card: #ffffff;
            --bg-gradient: linear-gradient(135deg, #fdf8f8 0%, #f5e6e8 100%);
            --text-primary: #2d2d2d;
            --text-secondary: #6b6b6b;
            --text-muted: #9a9a9a;
            --shadow-sm: 0 2px 8px rgba(212, 145, 154, 0.15);
            --shadow-md: 0 4px 20px rgba(212, 145, 154, 0.2);
            --radius-sm: 12px;
            --radius-md: 16px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg-gradient); min-height: 100vh; }
        
        .client-header {
            background: white;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: var(--shadow-sm);
        }
        .client-logo { display: flex; align-items: center; gap: 12px; flex: 1; }
        .client-logo-icon { width: 36px; height: 36px; color: var(--primary-dark); }
        .client-logo-text { font-weight: 600; font-size: 1rem; color: var(--secondary); }
        .back-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 8px;
        }
        
        .history-container { max-width: 500px; margin: 0 auto; padding: 20px; }
        .history-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            color: var(--secondary);
            margin-bottom: 20px;
        }
        
        .history-list { display: flex; flex-direction: column; gap: 12px; }
        .history-card {
            background: white;
            border-radius: var(--radius-md);
            padding: 16px;
            box-shadow: var(--shadow-sm);
        }
        .history-card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 10px;
            margin-bottom: 12px;
        }
        .history-service {
            font-weight: 600;
            color: var(--secondary);
            font-size: 1.1rem;
            flex: 1;
        }
        .history-status {
            font-size: 0.75rem;
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: 500;
            white-space: nowrap;
            min-width: 70px;
            text-align: center;
        }
        .history-status.confirmado {
            background: rgba(34, 154, 74, 0.1);
            color: #229a4e;
        }
        .history-status.cancelado {
            background: rgba(229, 62, 62, 0.1);
            color: #e53e3e;
        }
        .history-status.realizado {
            background: rgba(212, 145, 154, 0.2);
            color: var(--primary-dark);
        }
        .history-info {
            margin-top: 10px;
        }
        
        .history-info-label {
            font-size: 0.7rem;
            color: var(--text-muted);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }
        
        .history-info-row {
            display: flex;
            justify-content: flex-start;
            gap: 20px;
            color: var(--text-muted);
            font-size: 0.85rem;
        }
        
        .history-detail-date {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .history-detail-time {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .no-history {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
        }
        
        .history-card-actions {
            display: flex;
            gap: 8px;
            margin-top: 24px;
            margin-left: auto;
        }
        
        .history-action-btn {
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: var(--transition);
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }
        
        .history-action-btn.reschedule {
            background: var(--primary-light);
            color: var(--primary-dark);
        }
        
        .history-action-btn.reschedule:hover {
            background: var(--primary-dark);
            color: white;
        }
        
        .history-action-btn.cancel {
            background: rgba(229, 62, 62, 0.15);
            color: #e53e3e;
        }
        
        .history-action-btn.cancel:hover {
            background: #e53e3e;
            color: white;
        }
        
        .no-history svg {
            width: 60px;
            height: 60px;
            margin-bottom: 16px;
            opacity: 0.4;
        }
        
        .whatsapp-fab {
            position: fixed;
            bottom: 24px;
            right: 24px;
            width: 56px;
            height: 56px;
            background: #25D366;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--shadow-md);
            cursor: pointer;
            z-index: 1000;
            text-decoration: none;
        }
        .whatsapp-fab svg {
            width: 28px;
            height: 28px;
            color: white;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--primary-light);
            border-top-color: var(--primary-dark);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <header class="client-header">
        <button onclick="window.location.href='cliente.html'" class="back-btn">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M19 12H5M12 19L5 12L12 5"/>
            </svg>
        </button>
        <div class="client-logo">
            <svg class="client-logo-icon" viewBox="0 0 50 50" fill="none">
                <circle cx="25" cy="25" r="23" stroke="currentColor" stroke-width="2"/>
                <path d="M25 12C25 12 18 18 18 26C18 31 21 35 25 35C29 35 32 31 32 26C32 18 25 12 25 12Z" fill="currentColor" opacity="0.3"/>
            </svg>
            <span class="client-logo-text">Histórico</span>
        </div>
    </header>

    <div class="history-container">
        <h1 class="history-title">Meu Histórico</h1>
        <p style="color: var(--text-muted); font-size: 0.9rem;">Últimos 90 dias</p>
        
        <div id="historyList" class="history-list">
            <div class="loading"><div class="spinner"></div></div>
        </div>
    </div>

    <a href="#" id="whatsappFab" class="whatsapp-fab" target="_blank" style="display: none;">
        <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.148-.66-1.6-.906-2.166-.244-.565-.497-1.003-.713-1.166-.218-.164-.487-.198-.664-.198-.177 0-.389.025-.56.149-.173.124-.297.298-.297.398-.075.198.298.571.446.721.149.149.32.347.492.496.173.149.297.223.446.124.149-.099.62-.497 1.03-.793.296-.219.62-.348.88-.347.248-.002.492-.025.698-.025.209 0 .497-.05.716-.248.22-.199.446-.496.571-.743.124-.248.049-.495-.025-.694-.075-.198-.645-1.556-.906-2.105-.248-.547-.468-.96-.66-1.123-.193-.163-.345-.248-.496-.273-.149-.025-.297-.025-.446-.025-.148 0-.371.025-.496.173zM12 22c2.763 0 5-2.239 5-5s-2.237-5-5-5-5 2.239-5 5 2.238 5 5 5z"/>
        </svg>
    </a>

    <script src="config.js"></script>
    <script>
        const API_URL = 'https://us-central1-app-jeci-vieira-nails.cloudfunctions.net/api';
        
        const clienteUid = localStorage.getItem('cliente_uid');
        if (!clienteUid) {
            window.location.href = 'login.html';
        }

        async function loadHistory() {
            try {
                const uid = localStorage.getItem('cliente_uid');
                const clienteNome = localStorage.getItem('cliente_nome') || '';
                console.log('clienteUid:', uid, 'clienteNome:', clienteNome);
                const response = await fetch(API_URL + '?action=getClientAppointments&uid=' + uid + '&clienteNome=' + encodeURIComponent(clienteNome));
                const appointments = await response.json();
                console.log('Total agendamentos do cliente:', appointments.length);
                
                const list = document.getElementById('historyList');
                
                if (appointments.length === 0) {
                    list.innerHTML = `
                        <div class="no-history">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                <circle cx="12" cy="12" r="10"/>
                                <polyline points="12 6 12 12 16 14"/>
                            </svg>
                            <p>Nenhum agendamento encontrado</p>
                        </div>
                    `;
                    return;
                }
                
                console.log('Primeiro agendamento:', appointments[0]);
                list.innerHTML = 'Carregando...';
                
                setTimeout(function() {
                    list.innerHTML = appointments.map(app => {
                        const dateParts = app.data.split('-');
                        const formattedDate = `${dateParts[2]}/${dateParts[1]}/${dateParts[0]}`;
                        const status = app.status || 'confirmado';
                        const isFutureAppointment = status === 'confirmado';
                        
                        return `
                            <div class="history-card" data-id="${app.id || ''}" data-data="${app.data}" data-hora="${app.hora}" data-servico="${app.servico}">
                                <div class="history-card-header">
                                    <span class="history-service">${app.servico}</span>
                                    <span class="history-status ${status}">${status === 'confirmado' ? 'Agendado' : status === 'cancelado' ? 'Cancelado' : 'Realizado'}</span>
                                </div>
                                <div class="history-info">
                                    <div class="history-info-label">Detalhes do Agendamento</div>
                                    <div class="history-info-row">
                                        <span class="history-detail-date">
                                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                                <rect x="3" y="4" width="18" height="18" rx="2"/>
                                                <line x1="16" y1="2" x2="16" y2="6"/>
                                                <line x1="8" y1="2" x2="8" y2="6"/>
                                            </svg>
                                            ${formattedDate}
                                        </span>
                                        <span class="history-detail-time">
                                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                                <circle cx="12" cy="12" r="10"/>
                                                <polyline points="12 6 12 12 16 14"/>
                                            </svg>
                                            ${app.hora}
                                        </span>
                                    </div>
                                </div>
                                ${isFutureAppointment ? `
                                <div class="history-card-actions">
                                    <button class="history-action-btn reschedule" onclick="rescheduleHistoryAppointment(this)">
                                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                                            <line x1="16" y1="2" x2="16" y2="6"/>
                                            <line x1="8" y1="2" x2="8" y2="6"/>
                                            <line x1="3" y1="10" x2="21" y2="10"/>
                                        </svg>
                                        Reagendar
                                    </button>
                                    <button class="history-action-btn cancel" onclick="cancelHistoryAppointment(this)">
                                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                            <line x1="18" y1="6" x2="6" y2="18"></line>
                                            <line x1="6" y1="6" x2="18" y2="18"></line>
                                        </svg>
                                        Cancelar
                                    </button>
                                </div>
                                ` : ''}
                            </div>
                        `;
                    }).join('');
                }, 100);
                
            } catch (error) {
                console.error('Erro ao carregar histórico:', error);
                document.getElementById('historyList').innerHTML = '<div class="no-history">Erro ao carregar histórico</div>';
            }
        }

        async function loadSalaoData() {
            try {
                const response = await fetch(API_URL + '?action=getSalaoPublico');
                const data = await response.json();
                
                if (data.telefone) {
                    const whatsappFab = document.getElementById('whatsappFab');
                    const cleanPhone = data.telefone.replace(/\D/g, '');
                    const message = encodeURIComponent('Olá! Gostaria de mais informações.');
                    whatsappFab.href = `https://wa.me/${cleanPhone}?text=${message}`;
                    whatsappFab.style.display = 'flex';
                }
            } catch (error) {
                console.error('Erro ao carregar dados do salão:', error);
            }
        }

        loadHistory();
        loadSalaoData();
        
        window.cancelHistoryAppointment = function(btn) {
            const card = btn.closest('.history-card');
            const data = card.dataset.data;
            const hora = card.dataset.hora;
            const servico = card.dataset.servico;
            
            const appDateTime = new Date(data + 'T' + hora);
            const now = new Date();
            const hoursDiff = (appDateTime - now) / (1000 * 60 * 60);
            
            if (hoursDiff < 24) {
                alert('Cancelamento permitido apenas com antecedência de 24 horas.');
                return;
            }
            
            if (confirm(`Deseja cancelar o agendamento de ${servico} no dia ${data} às ${hora}?`)) {
                fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        action: 'cancelarAgendamento',
                        data: data,
                        hora: hora
                    })
                })
                .then(res => res.json())
                .then(result => {
                    if (result.sucesso) {
                        alert('Agendamento cancelado com sucesso!');
                        loadHistory();
                    } else {
                        alert(result.erro || 'Erro ao cancelar');
                    }
                })
                .catch(err => {
                    console.error(err);
                    alert('Erro ao cancelar');
                });
            }
        };
        
        window.rescheduleHistoryAppointment = function(btn) {
            const card = btn.closest('.history-card');
            const id = card.dataset.id;
            const data = card.dataset.data;
            const hora = card.dataset.hora;
            const servico = card.dataset.servico;
            
            const appDateTime = new Date(data + 'T' + hora);
            const now = new Date();
            const hoursDiff = (appDateTime - now) / (1000 * 60 * 60);
            
            if (hoursDiff < 24) {
                alert('Reagendamento permitido apenas com antecedência de 24 horas.');
                return;
            }
            
            if (confirm(`Deseja reagendar o agendamento de ${servico} no dia ${data} às ${hora}?`)) {
                localStorage.setItem('reagendamento_id', id);
                window.location.href = 'agendamento.html';
            }
        };
    </script>
</body>
</html>
