<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste de Cores - Rose</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #FFF9F6;
            min-height: 100vh;
            padding: 40px 20px;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            text-align: center;
            color: #2D2D2D;
            margin-bottom: 12px;
            font-size: 1.75rem;
        }

        p {
            text-align: center;
            color: #6B6B6B;
            margin-bottom: 40px;
            font-size: 0.9rem;
        }

        .cores-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 24px;
            max-width: 400px;
            margin: 0 auto;
        }

        .cor-card {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .amostra {
            height: 120px;
            border-radius: 20px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.1);
        }

        .amostra-degrade {
            background: linear-gradient(135deg, var(--principal) 0%, var(--variante) 100%);
        }

        .info {
            text-align: center;
        }

        .nome-cor {
            font-weight: 600;
            color: #2D2D2D;
            font-size: 0.95rem;
        }

        .codigo {
            font-size: 0.8rem;
            color: #6B6B6B;
            font-family: monospace;
        }

        .opcao-1 {
            --principal: #D4A5A5;
            --variante: #C98B8B;
        }

        .opcao-2 {
            --principal: #C98B8B;
            --variante: #E8C4C4;
        }

        .opcao-3 {
            --principal: #E57B85;
            --variante: #F0B7B5;
        }

        .opcao-4 {
            --principal: #B76E79;
            --variante: #E5B299;
        }
    </style>
</head>
<body>
    <h1>Teste de Cores</h1>
    <p>Escolha o tom de rose preferido</p>

    <div class="cores-container">
        <div class="cor-card opcao-1">
            <div class="amostra amostra-degrade"></div>
            <div class="info">
                <div class="nome-cor">Rose Clássico</div>
                <div class="codigo">#D4A5A5 → #C98B8B</div>
            </div>
        </div>

        <div class="cor-card opcao-2">
            <div class="amostra amostra-degrade"></div>
            <div class="info">
                <div class="nome-cor">Rose Romântico</div>
                <div class="codigo">#C98B8B → #E8C4C4</div>
            </div>
        </div>

        <div class="cor-card opcao-3">
            <div class="amostra amostra-degrade"></div>
            <div class="info">
                <div class="nome-cor">Rose Blush</div>
                <div class="codigo">#E57B85 → #F0B7B5</div>
            </div>
        </div>

        <div class="cor-card opcao-4">
            <div class="amostra amostra-degrade"></div>
            <div class="info">
                <div class="nome-cor">Rose Gold Atual</div>
                <div class="codigo">#B76E79 → #E5B299</div>
            </div>
        </div>
    </div>
</body>
</html>
